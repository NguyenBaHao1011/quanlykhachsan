<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Khách Hàng | Khách Sạn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-left">
        <span class="logo">🏨 Hotel Admin</span>
    </div>

    <ul class="nav-menu">
        <li class="nav-item active" onclick="go('QLKH.html')">Khách hàng</li>
        <li class="nav-item" onclick="go('../QLP/QLP.html')">Phòng</li>
        <li class="nav-item" onclick="go('../DatPhong/DatPhong.html')">Đặt phòng</li>
        <li class="nav-item" onclick="go('../QLHD/QLHD.html')">Hóa đơn</li>
    </ul>

    <div class="navbar-right">
        <span class="user">Admin</span>
        <button class="logout-btn">Đăng xuất</button>
    </div>
</nav>

<div class="container">

    <section class="form-section">
        <h2 id="formTitle">Thêm khách hàng</h2>

        <form class="customer-form" id="customerForm">
            <input type="hidden" id="editId">

            <div class="form-group">
                <label>Họ tên</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" id="phone" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email">
            </div>

            <div class="form-group">
                <label>CCCD</label>
                <input type="text" id="cccd">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit" id="submitBtn">
                    Thêm khách hàng
                </button>
                <button type="button" class="btn-cancel" id="cancelBtn" hidden>
                    Hủy
                </button>
            </div>
        </form>
    </section>

    <section class="table-section">
        <h2>Danh sách khách hàng</h2>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Tìm kiếm theo tên...">
        </div>

        <table>
            <thead>
                <tr>
                    <th>Mã KH</th>
                    <th>Họ tên</th>
                    <th>SĐT</th>
                    <th>Email</th>
                    <th>CCCD</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="customerTable"></tbody>
        </table>
    </section>

</div>

</script>
<script>
function go(page){
    window.location.href = page;
}
</script>
<script src="script.js"></script>
</body>
</html>

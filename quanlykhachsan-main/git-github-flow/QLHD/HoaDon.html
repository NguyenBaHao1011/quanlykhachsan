```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hóa đơn thanh toán</title>
<link rel="stylesheet" href="hoadon.css">
</head>

<body>

<div class="container">

<h1>HÓA ĐƠN THANH TOÁN KHÁCH SẠN</h1>

<div class="info">
<h3>Thông tin khách hàng</h3>
<p>Tên khách: <span id="tenKhach"></span></p>
<p>SĐT: <span id="sdt"></span></p>
</div>

<div class="info">
<h3>Thông tin phòng</h3>
<p>Mã phòng: <span id="phong"></span></p>
<p>Ngày nhận: <span id="ngayNhan"></span></p>
<p>Ngày trả: <span id="ngayTra"></span></p>
<p>Số ngày ở: <span id="soNgay"></span></p>
</div>

<h3>Dịch vụ sử dụng</h3>

<table>
<thead>
<tr>
<th>Dịch vụ</th>
<th>Số lượng</th>
<th>Đơn giá</th>
<th>Thành tiền</th>
</tr>
</thead>

<tbody id="dsDichVu">
</tbody>

</table>

<div class="tongtien">

<p>Tiền phòng: <span id="tienPhong"></span> VNĐ</p>

<p>Tiền dịch vụ: <span id="tienDV"></span> VNĐ</p>

<h2>Tổng thanh toán: <span id="tongTien"></span> VNĐ</h2>

</div>

<div class="button">

<button onclick="thanhToan()">Thanh toán</button>

<button onclick="window.print()">In hóa đơn</button>

</div>

</div>

<script src="hoadon.js"></script>

</body>
</html>

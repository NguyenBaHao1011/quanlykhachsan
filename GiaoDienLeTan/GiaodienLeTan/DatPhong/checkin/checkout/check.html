<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hotel Management</title>
<link rel="stylesheet" href="check.css">
</head>

<body>

<h1> HỆ THỐNG QUẢN LÝ KHÁCH SẠN - CHECKIN / CHECKOUT</h1>

<div class="form">

<input type="text" id="customerId" placeholder="Mã khách hàng">
<input type="text" id="customerName" placeholder="Tên khách">
<input type="text" id="roomId" placeholder="Mã phòng">

<div class="buttons">
<button class="checkin" onclick="checkIn()">Check In</button>
<button class="checkout" onclick="checkOut()">Check Out</button>
</div>

</div>

<h2>Danh sách khách</h2>

<table>

<thead>
<tr>
<th>Mã khách</th>
<th>Tên khách</th>
<th>Mã phòng</th>
<th>Check In</th>
<th>Check Out</th>
<th>Trạng thái</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script src="check.js"></script>

</body>
</html>

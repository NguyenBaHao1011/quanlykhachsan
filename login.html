<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Luxury Hotel</title>
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="assets/js/theme-toggle.js"></script>
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            color: white;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
        }

        input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: white;
            color: #4f46e5;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .footer-links {
            margin-top: 30px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .footer-links a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="login-container glass">
    <div class="logo"><i class="fas fa-hotel"></i></div>
    <h2>Luxury Hotel</h2>

    <div class="form-group">
        <label>Tên đăng nhập</label>
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" placeholder="Nhập tên đăng nhập">
        </div>
    </div>

    <div class="form-group">
        <label>Mật khẩu</label>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Nhập mật khẩu">
        </div>
    </div>

    <button class="btn-login" onclick="login()">ĐĂNG NHẬP</button>

    <div class="footer-links">
        Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
    </div>
</div>

<script>
    async function remoteLog(message, level = 'INFO') {
        try {
            await fetch('/api/logs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, level })
            });
        } catch (e) {
            console.warn("Log failed:", e);
        }
    }

    async function login() {
        const usernameInput = document.querySelector('input[placeholder="Nhập tên đăng nhập"]');
        const passwordInput = document.querySelector('input[placeholder="Nhập mật khẩu"]');
        
        const username = usernameInput.value;
        const password = passwordInput.value;

        if (!username || !password) {
            alert("Vui lòng nhập đầy đủ thông tin");
            return;
        }

        // Đã xóa phần log role từ phía client
        await remoteLog(`Login attempt - Username: ${username}`);

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // Chỉ gửi username và password lên API
                body: JSON.stringify({ username, password }) 
            });

            if (!response.ok) {
                const errorData = await response.json();
                await remoteLog(`Login failed: ${errorData.message}`, 'WARN');
                alert(errorData.message || "Đăng nhập thất bại");
                return;
            }

            const result = await response.json();
            
            // Lấy role từ API trả về (result.user.role) để log và phân quyền
            await remoteLog(`Login success: ${username} (${result.user.role})`);

            // Persist session
            localStorage.setItem('user', JSON.stringify(result.user));

            // Dùng role do Backend trả về để điều hướng
            const redirectMap = {
                'admin': 'admin/index.html',
                'receptionist': 'receptionist/index.html',
                'accountant': 'accountant/index.html',
                'customer': 'customer/index.html'
            };
            
            window.location.href = redirectMap[result.user.role] || 'customer/index.html';

        } catch (error) {
            console.error("Login error:", error);
            await remoteLog(`Login script error: ${error.message}`, 'ERROR');
            alert("Không thể kết nối tới máy chủ. Vui lòng kiểm tra kết nối mạng.");
        }
    }
</script>

</body>
</html>
